services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hookshot
    ports:
      - "5433:5433"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    command: >
      bash -lc "uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build: .
    env_file:
      - .env
    depends_on:
      - db
      - redis
    command: >
      bash -lc "celery -A app.tasks.celery_app:celery_app worker -l INFO"

  beat:
    build: .
    env_file:
      - .env
    depends_on:
      - db
      - redis
    command: >
      bash -lc "celery -A app.tasks.celery_app:celery_app beat -l INFO"

volumes:
  pgdata: